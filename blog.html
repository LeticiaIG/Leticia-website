<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Leticia Izquierdo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="blog-styles.css">
</head>
<body class="blog-page">
    <header>
        <nav>
            <a href="index.html" class="logo">Leticia Izquierdo</a>
            <ul class="nav-links">
                <li><a href="index.html#works">Works</a></li>
                <li><a href="index.html#publications">Publications</a></li>
                <li><a href="index.html#media-workshops">Media</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="index.html#about">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="blog-main">
        <!-- Hero - Foster Minimal -->
        <section class="blog-hero">
            <div class="container">
                <p class="blog-title">Writing</p>
                <h1 class="blog-subtitle">Reflections on cities, technology, and the spaces we inhabit.</h1>
            </div>
        </section>

        <!-- Blog posts grid -->
        <section class="blog-posts-section">
            <div class="container">
                <div id="blog-posts-grid" class="blog-posts-grid">
                    <!-- Posts loaded dynamically -->
                </div>
            </div>
        </section>
    </main>

    <!-- Article Reader Modal -->
    <div id="article-modal" class="article-modal">
        <div class="article-modal-content">
            <button class="article-close" onclick="closeArticle()">×</button>
            <div id="article-content" class="article-content">
                <!-- Article content loaded here -->
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-main">
                <p class="footer-copy">&copy; 2025 Leticia Izquierdo</p>
                <div class="social-links">
                    <a href="https://www.linkedin.com/in/leticia-izquierdo" target="_blank">LinkedIn</a>
                    <a href="https://www.instagram.com/letici.ai" target="_blank">Instagram</a>
                    <a href="https://scholar.google.com/citations?user=YOhqs88AAAAJ&hl=es" target="_blank">Scholar</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="blog.js"></script>
</body>
</html>
