<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Leticia Izquierdo</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            background: #0a0d12;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .uc-label {
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--coral, #E8967E);
            margin-bottom: 1.5rem;
        }
        .uc-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: rgba(255,255,255,0.92);
            margin: 0 0 1rem;
        }
        .uc-sub {
            font-size: 1rem;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2.5rem;
        }
        .uc-back {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.45);
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 2px;
            transition: color 0.2s;
        }
        .uc-back:hover { color: var(--coral, #E8967E); }
    </style>
</head>
<body>
    <p class="uc-label">Blog</p>
    <h1 class="uc-title">Under construction.</h1>
    <p class="uc-sub">Something is brewing — check back soon.</p>
    <a href="index.html" class="uc-back">← Back to home</a>
</body>
</html>
